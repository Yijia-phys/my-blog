<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bgb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="100%" stop-color="#eef0f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6272c4"/>
      <stop offset="100%" stop-color="#4a5aab"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bgb)"/>
  <!-- Subtle border -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="6.4"
        fill="none" stroke="rgba(98,114,196,0.2)" stroke-width="1"/>
  <!-- Y letterform — matching main site shape but in blog palette -->
  <polyline points="8,7 16,18 24,7"
            fill="none" stroke="url(#accent)" stroke-width="2.8"
            stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="16" y1="18" x2="16" y2="26"
        stroke="url(#accent)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Accent dot -->
  <circle cx="16" cy="26" r="1.4" fill="#6272c4" opacity="0.6"/>
</svg>

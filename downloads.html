const CHEVRON_SVG = `<svg class="dl-chevron" viewBox="0 0 20 20" fill="currentColor">
  <path fill-rule="evenodd" d="M7.293 4.293a1 1 0 011.414 0L14 9.586l-5.293
  5.293a1 1 0 01-1.414-1.414L11.586 9.586 7.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
</svg>`;

function renderBtn({ type, label, icon, href }) {
  const cls = type === "pdf" ? "dl-btn-pdf" : "dl-btn-src";
  return `<a class="dl-btn ${cls}" href="${href}"><i class="bi ${icon}"></i> ${label}</a>`;
}

function renderRow({ title, tag, desc, date, links }) {
  return `<tr>
    <td class="name">${title}<span class="dl-tag">${tag}</span></td>
    <td class="desc">${desc}</td>
    <td class="date" data-label="Date">${date}</td>
    <td class="actions" data-label="Download">${links.map(renderBtn).join("")}</td>
  </tr>`;
}

function renderSection({ name, icon, open, files }) {
  const rows   = files.map(renderRow).join("");
  const count  = files.length;
  const openAttr = open ? " open" : "";
  return `<div class="dl-section">
  <details class="dl-folder"${openAttr}>
    <summary>
      ${CHEVRON_SVG}
      <i class="bi ${icon} dl-folder-icon"></i>
      <span class="dl-folder-name">${name}</span>
      <span class="dl-folder-count">${count} file${count !== 1 ? "s" : ""}</span>

        <th style="width:9%">Date</th>
        <th style="width:16%">Download</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </details>
</div>`;
}

document.getElementById("dl-root").innerHTML =
  SECTIONS.map(renderSection).join("\n");
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".code-figure").forEach(function (container) {
    const codeBlock = container.querySelector(".code-copy-outer-scaffold > div.sourceCode");
    const scaffold  = container.querySelector(".code-copy-outer-scaffold");
    if (!codeBlock || !scaffold) return;

    const imgParas = container.querySelectorAll(".quarto-figure, p:has(img)");
    if (!imgParas.length) return;
    const lastImg = imgParas[imgParas.length - 1];

    codeBlock.style.maxHeight  = "0";
    codeBlock.style.overflow   = "hidden";
    codeBlock.style.transition = "max-height 0.25s ease";
    scaffold.style.display     = "none";

    let expandedHeight = null;

    const btn = document.createElement("button");
    btn.textContent = "</>";
    btn.className   = "toggle-code-btn";
    btn.title       = "Display / Hide";

    btn.addEventListener("click", function () {
      const isCollapsed = scaffold.style.display === "none";
      if (isCollapsed) {
        scaffold.style.display = "";
        if (!expandedHeight) {
          codeBlock.style.maxHeight = "none";
          expandedHeight = codeBlock.scrollHeight + "px";
        }
        codeBlock.style.maxHeight = expandedHeight;
        btn.classList.add("active");
      } else {
        codeBlock.style.maxHeight = "0";
        setTimeout(() => { scaffold.style.display = "none"; }, 250);
        btn.classList.remove("active");
      }
    });

    container.appendChild(btn);
  });

  function syncThumbnails() {
    const dark = document.body.classList.contains("quarto-dark");
    document.querySelectorAll("img.thumbnail-image.card-img").forEach(function (img) {
      const src = img.src;
      if (!/_light\.|_dark\./.test(src)) return;
      if (dark) {
        img.src = src.replace(/_light\./, "_dark.");
        img.classList.add("darkmode");
      } else {
        img.src = src.replace(/_dark\./, "_light.");
        img.classList.remove("darkmode");
      }
    });
  }

  syncThumbnails();
  new MutationObserver(syncThumbnails).observe(document.body, {
    attributes: true,
    attributeFilter: ["class"]
  });
});
</script>

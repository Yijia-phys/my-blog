<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".code-figure").forEach(function (container) {
    const scaffold  = container.querySelector(".code-copy-outer-scaffold");
    if (!scaffold) return;

    const imgParas = container.querySelectorAll(".quarto-figure, p:has(img)");
    if (!imgParas.length) return;
    const lastImg = imgParas[imgParas.length - 1];

    // Wrap scaffold so the whole block animates as one unit
    const wrapper = document.createElement("div");
    wrapper.className = "code-toggle-wrapper";
    wrapper.style.overflow   = "hidden";
    wrapper.style.maxHeight  = "0";
    wrapper.style.transition = "max-height 0.35s ease";
    scaffold.parentNode.insertBefore(wrapper, scaffold);
    wrapper.appendChild(scaffold);

    let expandedHeight = null;

    const btn = document.createElement("button");
    btn.textContent = "</>";
    btn.className   = "toggle-code-btn";
    btn.title       = "Show / Hide code";

    btn.addEventListener("click", function () {
      const collapsed = wrapper.style.maxHeight === "0px";
      if (collapsed) {
        if (!expandedHeight) {
          wrapper.style.maxHeight = "none";
          expandedHeight = wrapper.scrollHeight + "px";
        }
        wrapper.style.maxHeight = expandedHeight;
        btn.classList.add("active");
      } else {
        wrapper.style.maxHeight = "0";
        btn.classList.remove("active");
      }
    });

    container.appendChild(btn);
  });

  function syncThumbnails() {
    const dark = document.body.classList.contains("quarto-dark");
    document.querySelectorAll("img.thumbnail-image.card-img").forEach(function (img) {
      const src = img.src;
      if (!/_light\.|_dark\./.test(src)) return;
      if (dark) {
        img.src = src.replace(/_light\./, "_dark.");
        img.classList.add("darkmode");
      } else {
        img.src = src.replace(/_dark\./, "_light.");
        img.classList.remove("darkmode");
      }
    });
  }

  syncThumbnails();
  new MutationObserver(syncThumbnails).observe(document.body, {
    attributes: true,
    attributeFilter: ["class"]
  });

  // After MathJax finishes, force flex layout recalculation
  if (window.MathJax) {
    MathJax.startup.promise.then(function () {
      document.body.style.minHeight = (document.body.scrollHeight - 1) + "px";
      document.body.offsetHeight; // force reflow
      document.body.style.minHeight = "";
    });
  }
});
</script>
